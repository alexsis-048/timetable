            padding: 0;
            box-sizing: border-box;
        }

            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);

            color: #333;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
            background: rgba(255, 255, 255, 0.95);
            padding: 30px;

            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(10px);
        }

        .header h1 {
            color: #2c3e50;
            font-size: 2.5rem;
            margin-bottom: 10px;
            background: linear-gradient(45deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .week-controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin: 20px 0;
            flex-wrap: wrap;
        }

        .week-toggle {
            display: flex;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 25px;
            padding: 8px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .week-btn {
            padding: 12px 24px;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.9rem;
            transition: all 0.3s ease;
            background: transparent;
            color: #7f8c8d;
        }

        .week-btn.active {
            background: linear-gradient(45deg, #667eea, #764ba2);
            color: white;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
        }

        .week-info {
            background: rgba(255, 255, 255, 0.9);
            padding: 15px 25px;
            border-radius: 20px;
            font-weight: bold;
            color: #2c3e50;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .schedule-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 25px;
            margin-bottom: 30px;
        }

        .day-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
            backdrop-filter: blur(10px);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .day-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.2);
        }

        .day-title {
            font-size: 1.4rem;
            font-weight: bold;
            color: #2c3e50;
            margin-bottom: 20px;
            text-align: center;
            padding-bottom: 10px;
            border-bottom: 3px solid transparent;
            background: linear-gradient(45deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            border-image: linear-gradient(45deg, #667eea, #764ba2) 1;
        }

        .class-item {
            margin-bottom: 15px;
            padding: 15px;
            border-radius: 15px;
            transition: all 0.3s ease;
            border-left: 4px solid transparent;
        }

        .class-item:not(.no-class):hover {
            background: linear-gradient(135deg, #667eea15, #764ba215);

        }

        .class-item.lecture {

        .day-card:nth-child(6) { animation-delay: 0.6s; }

            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>

        // Автоматичне визначення тижня
       function calculateCurrentWeek() {
    // 1 вересня 2025
    const sept1 = new Date('2025-09-01');
    const sept1Day = sept1.getDay(); // 0 = неділя, 1 = понеділок, ...

    // Знаходимо понеділок того тижня, де знаходиться 1 вересня
    const firstMonday = new Date(sept1);
    firstMonday.setDate(sept1.getDate() - (sept1Day === 0 ? 6 : sept1Day - 1));

    // Поточна дата → беремо понеділок цього тижня
    const now = new Date();
    const currentMonday = new Date(now);
    const currentDay = now.getDay();
    currentMonday.setDate(now.getDate() - (currentDay === 0 ? 6 : currentDay - 1));

    // Різниця в тижнях
    const timeDiff = currentMonday - firstMonday;
    const weeksPassed = Math.floor(timeDiff / (7 * 24 * 60 * 60 * 1000));

    // Номер тижня
    currentWeek = 1 + weeksPassed;

    // 1-й тиждень = парний, 2-й = непарний, і так далі
    currentWeekType = currentWeek % 2 === 0 ? 'even' : 'odd';

    console.log(`Перший понеділок: ${firstMonday.toDateString()}`);
    console.log(`Поточний понеділок: ${currentMonday.toDateString()}`);
    console.log(`Тижнів пройшло: ${weeksPassed}`);
    console.log(`Поточний тиждень: ${currentWeek} (${currentWeekType})`);
}


        // Встановлення типу тижня

                document.getElementById('evenBtn').classList.toggle('active', type === 'even');

            updateWeekInfo();
            renderSchedule();
        }

}


        // Генерація розкладу

                { key: 'thursday', name: '📙 Четвер', emoji: '💻' },
                { key: 'friday', name: '📒 П\'ятниця', emoji: '🐹' },
                { key: 'saturday', name: '📓 Субота', emoji: '🔄' }
            ];

            const scheduleGrid = document.getElementById('scheduleGrid');
            scheduleGrid.innerHTML = '';

            days.forEach((day, index) => {
                const dayCard = document.createElement('div');
                dayCard.className = 'day-card';
                
                let dayHTML = `<h2 class="day-title">${day.emoji} ${day.name.split(' ')[1]}</h2>`;
                
              if (day.key === 'saturday') {
    // === Правильна логіка ротації субот ===
    // 1 тиждень → непарний понеділок
    // 2 → непарний вівторок
    // 3 → непарна середа
    // 4 → непарний четвер
    // 5 → непарна пʼятниця
    // 6 → парний понеділок ... і т.д. по колу

    const workdayKeys = ['monday','tuesday','wednesday','thursday','friday'];
    const workdayNames = ['Понеділок','Вівторок','Середа','Четвер','Пʼятниця'];

    const rotation = (currentWeek - 1) % 10;      // цикл 0..9
    const workdayIndex = rotation % 5;            // який день
    const isEvenSubstitute = rotation >= 5;       // парність заміни
    const subParity = isEvenSubstitute ? 'even' : 'odd';
    const workdayKey = workdayKeys[workdayIndex];
    const workdayName = workdayNames[workdayIndex];
    const parityLabel = subParity === 'even' ? 'парний' : 'непарний';

    // Заголовок суботи
    dayHTML += `
      <div style="text-align:center;margin-bottom:15px;padding:10px;
      background:linear-gradient(135deg,#f39c1210,#f39c1205);
      border-radius:10px;border-left:4px solid #f39c12;">
        <strong>Відпрацювання: ${workdayName} (${parityLabel} тиждень)</strong>
      </div>`;

    // Беремо розклад відповідного дня потрібної парності
    const dayClasses = scheduleData[workdayKey] || [];
    const relevantClasses = dayClasses.filter(cls =>
        cls.weeks === 'both' || cls.weeks === subParity
    );

                    // Додаємо всі слоти з 1 по 4
                    for (let slot = 1; slot <= 4; slot++) {
                        const slotClass = relevantClasses.find(cls => 
                            cls.time.startsWith(`${slot}.`)
                        );

                        if (slotClass) {
                            const typeClass = slotClass.type === 'none' ? 'no-class' : slotClass.type;
                            const typeLabel = slotClass.type === 'lab' ? 'Лабораторна' :
                                            slotClass.type === 'lecture' ? 'Лекція' :
                                            slotClass.type === 'practice' ? 'Практика' :
                                            'Вільно';
                            
                            dayHTML += `
                                <div class="class-item ${typeClass}">
                                    <div class="class-time">${slotClass.time}</div>
                                    <span class="class-type type-${slotClass.type === 'none' ? 'none' : slotClass.type}">${typeLabel}</span>
                                    <span class="week-indicator even-week">🔄 Відпр.</span>
                                    <div class="class-name">${slotClass.name}</div>
                                    ${slotClass.teacher ? `<div class="class-teacher" onclick="openTeacherContact('${slotClass.teacher}')" title="Написати викладачу">${slotClass.teacher}</div>` : ''}
                                    <div class="class-links">
                                        ${slotClass.link ? `<a href="${slotClass.link}" class="class-link meet-link" target="_blank">🎥 Посилання</a>` : ''}
                                        ${slotClass.googleClass ? `<a href="${slotClass.googleClass}" class="class-link google-class" target="_blank">📚 Classroom</a>` : ''}
                                    </div>
                                </div>
                            `;
                        } else {
                            // Порожній слот
                            const timeSlots = ['8:00-9:35', '9:50-11:25', '11:40-13:15', '13:30-15:05'];
                            dayHTML += `
                                <div class="class-item no-class">
                                    <div class="class-time">${slot}. ${timeSlots[slot-1]}</div>
                                    <span class="class-type type-none">Вільно</span>
                                    <div class="class-name">—</div>
                                </div>
                            `;
                        }
                    }
                } else {
                    // Звичайна логіка для будніх днів
                    const dayClasses = scheduleData[day.key] || [];
                    const relevantClasses = dayClasses.filter(cls => 
                        cls.weeks === 'both' || cls.weeks === currentWeekType
                    );

                    // Додаємо всі слоти з 1 по 4
                    for (let slot = 1; slot <= 4; slot++) {
                        const slotClass = relevantClasses.find(cls => 
                            cls.time.startsWith(`${slot}.`)
                        );

                        if (slotClass) {
                            const typeClass = slotClass.type === 'none' ? 'no-class' : slotClass.type;
                            const typeLabel = slotClass.type === 'lab' ? 'Лабораторна' :
                                            slotClass.type === 'lecture' ? 'Лекція' :
                                            slotClass.type === 'practice' ? 'Практика' :
                                            'Вільно';
                            
                            dayHTML += `
                                <div class="class-item ${typeClass}">
                                    <div class="class-time">${slotClass.time}</div>
                                    <span class="class-type type-${slotClass.type === 'none' ? 'none' : slotClass.type}">${typeLabel}</span>
                                    ${slotClass.weeks !== 'both' ? `<span class="week-indicator ${slotClass.weeks === 'odd' ? 'odd' : 'even'}-week">${slotClass.weeks === 'odd' ? '☝️' : '✌️'}</span>` : ''}
                                    <div class="class-name">${slotClass.name}</div>
                                    ${slotClass.teacher ? `<div class="class-teacher" onclick="openTeacherContact('${slotClass.teacher}')" title="Написати викладачу">${slotClass.teacher}</div>` : ''}
                                    <div class="class-links">
                                        ${slotClass.link ? `<a href="${slotClass.link}" class="class-link meet-link" target="_blank">🎥 Посилання</a>` : ''}
                                        ${slotClass.googleClass ? `<a href="${slotClass.googleClass}" class="class-link google-class" target="_blank">📚 Classroom</a>` : ''}
                                    </div>
                                </div>
                            `;
                        } else {
                            // Порожній слот
                            const timeSlots = ['8:00-9:35', '9:50-11:25', '11:40-13:15', '13:30-15:05'];
                            dayHTML += `
                                <div class="class-item no-class">
                                    <div class="class-time">${slot}. ${timeSlots[slot-1]}</div>
                                    <span class="class-type type-none">Вільно</span>
                                    <div class="class-name">—</div>
                                </div>
                            `;
                        }
                    }
                }

                dayCard.innerHTML = dayHTML;
                scheduleGrid.appendChild(dayCard);
            });
        }

        // Оновлення часу та тижня
        function updateTime() {
            const now = new Date();
            const options = { 
                weekday: 'short', 
                month: 'short', 
                day: 'numeric',
                hour: '2-digit',
                minute: '2-digit',
                timeZone: 'Europe/Kiev'
            };
            document.getElementById('currentTime').textContent = 
                now.toLocaleDateString('uk-UA', options);
            
            // Оновлюємо тиждень тільки в авто режимі
            if (isAutoMode) {
                const oldWeek = currentWeek;
                const oldWeekType = currentWeekType;
                calculateCurrentWeek();
                
                if (oldWeek !== currentWeek || oldWeekType !== currentWeekType) {
                    updateWeekInfo();
                    renderSchedule();
                }
            }
        }

        // Підсвічування поточного дня
        function highlightCurrentDay() {
            const today = new Date().getDay();
            const dayCards = document.querySelectorAll('.day-card');
            
            // Понеділок = 1, Вівторок = 2, ..., Субота = 6
            if (today >= 1 && today <= 6) {
                const cardIndex = today === 6 ? 5 : today - 1; // Субота останньа карточка
                setTimeout(() => {
                    dayCards[cardIndex].style.border = '5px solid #667eea';
                    dayCards[cardIndex].style.boxShadow = '0 20px 40px rgba(102, 126, 234, 0.3)';
                }, 500);
            }
        }

        // Ініціалізація
        function init() {
            calculateCurrentWeek();
            setWeek('auto'); // Починаємо в авто режимі
            updateTime();
            setInterval(updateTime, 60000); // Перевіряємо кожну хвилину
            highlightCurrentDay();
        }

        // Запуск
        init();
    </script>
</body>

</html>
